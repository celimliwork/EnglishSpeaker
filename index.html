<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>American English Speaker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Familjen+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-head">
          <h2>Sohbetler</h2>
          <button id="newChatBtn" class="btn ghost">+ Yeni</button>
        </div>
        <div id="chatList" class="chat-list"></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="left">
            <button id="toggleSidebarBtn" class="btn icon">☰</button>
            <h1>AI</h1>
          </div>
          <div class="right">
            <label class="ai-toggle">
              <input type="checkbox" id="aiProviderToggle" />
              <span id="aiProviderLabel">Gemini 🟢</span>
            </label>
            <button id="themeToggleBtn" class="btn icon">🌙</button>
            <button id="settingsBtn" class="btn icon">⚙️</button>
          </div>
        </header>

        <section id="messages" class="messages"></section>

        <footer class="composer">
          <button id="micBtn" class="mic-btn" title="Space ile aç/kapat">
            <span>🎙️</span>
            <span class="pulse-ring"></span>
          </button>
          <textarea
            id="messageInput"
            placeholder="İngilizce konuş veya yaz..."
            rows="2"
          ></textarea>
          <button id="sendBtn" class="btn primary">Gönder</button>
        </footer>
      </main>
    </div>

    <dialog id="settingsModal" class="settings-modal">
      <form method="dialog" class="settings-card">
        <div class="settings-head">
          <h2>Ayarlar</h2>
          <button id="closeSettingsBtn" class="btn icon" type="button">✕</button>
        </div>

        <label>Gemini API Key</label>
        <div class="row">
          <input id="geminiKeyInput" type="password" placeholder="AIza..." />
          <button id="toggleGeminiKey" class="btn ghost" type="button">Göster</button>
        </div>

        <label>OpenAI API Key</label>
        <div class="row">
          <input id="openaiKeyInput" type="password" placeholder="sk-..." />
          <button id="toggleOpenaiKey" class="btn ghost" type="button">Göster</button>
        </div>

        <label>Aktif AI</label>
        <div class="row">
          <label><input type="radio" name="provider" value="gemini" /> Gemini</label>
          <label><input type="radio" name="provider" value="openai" /> ChatGPT</label>
        </div>

        <label>Gemini Model</label>
        <select id="geminiModelSelect"></select>

        <label>OpenAI Model</label>
        <select id="openaiModelSelect"></select>

        <label>System Prompt</label>
        <textarea id="systemPromptInput" rows="8"></textarea>

        <label>İngilizce Seviyesi</label>
        <select id="englishLevelSelect">
          <option value="A1">A1 - Beginner</option>
          <option value="A2">A2 - Elementary</option>
          <option value="B1" selected>B1 - Intermediate</option>
          <option value="B2">B2 - Upper Intermediate</option>
          <option value="C1">C1 - Advanced</option>
          <option value="C2">C2 - Proficient</option>
        </select>

        <label>TTS Hız (<span id="ttsSpeedLabel">0.9</span>x)</label>
        <input id="ttsSpeedRange" type="range" min="0.7" max="1.3" step="0.1" />

        <label class="row">
          <input id="autoReadToggle" type="checkbox" />
          AI yanıtını otomatik oku
        </label>

        <label>STT Dil</label>
        <select id="sttLangSelect">
          <option value="en-US">en-US</option>
          <option value="tr-TR">tr-TR</option>
        </select>

        <label>Geçmiş Mesaj Limiti</label>
        <select id="historyLimitSelect">
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="30">30</option>
        </select>

        <div class="row">
          <button id="exportChatBtn" class="btn ghost" type="button">JSON Dışa Aktar</button>
          <button id="clearAllBtn" class="btn danger" type="button">Tüm Verileri Temizle</button>
        </div>

        <button id="saveSettingsBtn" class="btn primary" type="button">Kaydet</button>
      </form>
    </dialog>

    <dialog id="wordModal" class="settings-modal word-modal">
      <div class="settings-card">
        <div class="settings-head">
          <h2 id="wordModalTitle">Kelime</h2>
          <button id="closeWordModalBtn" class="btn icon" type="button">✕</button>
        </div>
        <div id="wordModalBody">Yükleniyor...</div>
      </div>
    </dialog>

    <div id="toastRoot" class="toast-root"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
  </html>
